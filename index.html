<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OHDXNIS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Inter, sans-serif;
  background:#050505;
  color:white;
}

/* MOVING LIGHT FIELD BACKGROUND */
body{
  background: radial-gradient(circle at 10% 20%, #ff003c22, transparent 40%),
              radial-gradient(circle at 80% 70%, #0033ff22, transparent 45%),
              radial-gradient(circle at 50% 50%, #ffffff10, transparent 60%);
  animation:bgmove 10s ease-in-out infinite alternate;
}

@keyframes bgmove{
  0%{filter:blur(0px) brightness(1);}
  100%{filter:blur(2px) brightness(1.2);}
}

/* NOISE TEXTURE */
.noise{
  position:fixed;
  inset:0;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.06;
  pointer-events:none;
}

/* MAIN LAYOUT */
.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* NAME */
h1{
  font-size:90px;
  letter-spacing:12px;
  margin:0;
  font-weight:700;
  transition:0.25s;
}

h1:hover{
  transform:skew(-6deg) scale(1.02);
}

/* SUBTEXT */
p{
  opacity:0.5;
  margin-top:10px;
  letter-spacing:2px;
}

/* LINKS */
.links{
  margin-top:25px;
  display:flex;
  gap:30px;
}

a{
  color:white;
  text-decoration:none;
  opacity:0.6;
  transition:0.2s;
  letter-spacing:2px;
}

a:hover{
  opacity:1;
  transform:translateY(-2px);
}

/* SOUND CLOUD */
iframe{
  margin-top:40px;
  filter:contrast(1.1);
}
</style>
</head>

<body>

<div class="noise"></div>

<div class="container">

  <h1>OHDXNIS</h1>

  <p>albanian artist</p>

  <div class="links">
    <a href="https://instagram.com/denis.gjoka_/" target="_blank">INSTAGRAM</a>
    <a href="https://youtube.com/@OhDxnis" target="_blank">YOUTUBE</a>
    <a href="https://soundcloud.com/ohdxnis" target="_blank">SOUNDCLOUD</a>
  </div>

  <iframe width="360" height="120" scrolling="no"
  frameborder="no"
  allow="autoplay"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/ohdxnis&color=%23000000">
  </iframe>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS</title>
    <style>
        :root {
            --bg-deep: #050505;
            --blood: #4a0000;
            --glitch-grey: #a1a1a1;
            --flicker-speed: 0.1s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--bg-deep);
            color: var(--glitch-grey);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* --- ATMOSPHERIC LAYERS --- */
        
        #vhs-grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Resolution_White_Noise_Video_Frame.png');
            opacity: 0.04;
            pointer-events: none;
            z-index: 999;
            animation: noise 0.2s infinite;
        }

        #overlay-tint {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 998;
            pointer-events: none;
        }

        /* --- ANIMATED BACKGROUND --- */
        
        .ambience {
            position: absolute;
            width: 150%; height: 150%;
            top: -25%; left: -25%;
            background: radial-gradient(circle at center, var(--blood) 0%, transparent 50%);
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 20s infinite alternate ease-in-out;
            z-index: 1;
        }

        /* --- MAIN IDENTITY --- */

        .center-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 8vw;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px var(--blood), -2px -2px #00ffff55;
            filter: url(#glitch);
            animation: flicker 4s infinite;
            user-select: none;
        }

        .subtitle {
            font-size: 0.8rem;
            margin-top: 10px;
            opacity: 0.6;
            animation: wave 5s infinite;
        }

        /* --- LINK MATRIX --- */
        
        .link-matrix {
            margin-top: 40px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 20;
        }

        .link-matrix a {
            color: var(--glitch-grey);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            position: relative;
            transition: all 0.2s ease-in-out;
            padding: 5px;
        }

        .link-matrix a:hover {
            color: #ffffff;
            text-shadow: 2px 0px var(--blood), -2px 0px #00ffff55;
            animation: text-flicker 0.1s infinite;
        }

        /* --- INTEGRATED MEDIA --- */

        .media-shrine {
            margin-top: 50px;
            width: 300px;
            filter: grayscale(1) contrast(1.5) invert(1);
            opacity: 0.3;
            transition: opacity 0.5s;
            z-index: 20;
        }

        .media-shrine:hover {
            opacity: 0.8;
            filter: grayscale(0.5) contrast(1.2) invert(0);
        }

        /* --- UI ELEMENTS --- */

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 10px;
            line-height: 1.5;
            color: var(--blood);
        }

        .interaction-prompt {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: #000;
            padding: 20px;
            border: 1px solid var(--blood);
            cursor: pointer;
            text-align: center;
        }

        /* --- ANIMATIONS --- */

        @keyframes noise {
            0% { transform: translate(0,0) }
            10% { transform: translate(-5%,-5%) }
            20% { transform: translate(-10%,5%) }
            50% { transform: translate(5%,-10%) }
            100% { transform: translate(0,0) }
        }

        @keyframes drift {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(5deg) scale(1.1); }
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 0.99; }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.4; }
        }

        @keyframes wave {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }

        @keyframes text-flicker {
            0% { opacity: 1; transform: translate(0, 0); }
            50% { opacity: 0.6; transform: translate(-2px, 1px); }
            100% { opacity: 1; transform: translate(1px, -1px); }
        }

        /* HIDDEN ELEMENTS */
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="glitch">
            <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
        </filter>
    </svg>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | AD INFINITUM</title>
    <style>
        :root {
            --abyss: #000000;
            --blood: #7a0000;
            --fresh-blood: #ff0000;
            --font-ritual: 'Cinzel', serif; /* Occult/Ancient style */
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--abyss);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* --- THE VOID GATE --- */
        #gate {
            position: fixed; inset: 0;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1.5s cubic-bezier(1, 0, 0, 1), opacity 1s ease;
        }
        .gate-pulse {
            font-size: 100px; color: var(--fresh-blood);
            animation: pulse-bloom 2s infinite;
            filter: blur(2px);
        }

        /* --- THE ENGINE --- */
        #abyss-canvas {
            position: fixed; inset: 0;
            z-index: 1; pointer-events: none;
        }

        #distortion-layer {
            position: fixed; inset: 0;
            z-index: 100; pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.1;
            mix-blend-mode: overlay;
        }

        /* --- CONTENT VIEWPORT --- */
        .viewport {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 2s ease;
        }

        /* THE TITLE: ESOTERIC & REFINED */
        .header { 
            margin-bottom: 5vh; 
            filter: url(#glitch-filter);
        }
        
        h1#ritual-title {
            font-family: 'Cinzel', serif;
            font-size: 8vw;
            letter-spacing: 20px;
            color: #fff;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 20px var(--blood);
            animation: ghost-slide 0.2s infinite;
        }

        .subtitle {
            color: var(--fresh-blood);
            font-size: 1rem;
            letter-spacing: 2rem;
            text-align: center;
            width: 100%;
            margin-top: 10px;
            opacity: 0.7;
        }

        /* --- THE FLOATING NODES --- */
        .altar-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 80%;
        }

        .node {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .node .sigil {
            font-size: 3rem;
            color: var(--blood);
            margin-bottom: 15px;
            transition: 0.2s;
            filter: blur(1px);
        }

        .node .label {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            border-bottom: 1px solid var(--blood);
            padding-bottom: 5px;
        }

        .node:hover {
            transform: scale(1.2) translateY(-10px);
        }
        .node:hover .sigil {
            color: var(--fresh-blood);
            filter: blur(0px) drop-shadow(0 0 15px red);
            transform: rotate(180deg);
        }
        .node:hover .label {
            color: var(--fresh-blood);
            border-color: #fff;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse-bloom { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.5); opacity: 1; } }
        
        @keyframes ghost-slide {
            0% { transform: translateX(0); }
            33% { transform: translateX(-2px) skewX(2deg); color: #ff000033; }
            66% { transform: translateX(2px) skewX(-2deg); color: #fff; }
        }

        svg { position: absolute; width: 0; height: 0; }
    </style>
</head>
<body onclick="awaken()">

    <div id="gate">
        <div class="gate-pulse">🜏</div>
    </div>

    <div id="distortion-layer"></div>

    <svg>
        <filter id="glitch-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
        </filter>
    </svg>

    <canvas id="abyss-canvas"></canvas>

    <div class="viewport" id="main">
        <div class="header">
            <h1 id="ritual-title">OHDXNIS</h1>
            <p class="subtitle">AD INFINITUM</p>
        </div>

        <div class="altar-container">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="node">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="node">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="node">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="node">
                <span class="sigil">⛧</span><span class="label">Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="node">
                <span class="sigil">🜔</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="node">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="node">
                <span class="sigil">🜓</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="node">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="node">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="audio-engine" loop>
        <source src="Bleood  type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio-engine');
        const canvas = document.getElementById('abyss-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, frame = 0;
        let particles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<800; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    s: Math.random() * 2 + 0.5,
                    vY: Math.random() * 8 + 2,
                    char: ['⛧', '🜏', '⸸', '𖤐'][Math.floor(Math.random()*4)],
                    o: Math.random() * 0.4
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Feedback trail
            ctx.fillRect(0, 0, width, height);
            
            frame++;

            // Draw Alchemical Rotating Seal
            ctx.save();
            ctx.translate(width/2, height/2);
            ctx.rotate(frame * 0.005);
            ctx.strokeStyle = 'rgba(122, 0, 0, 0.1)';
            for(let i=0; i<8; i++) {
                ctx.rotate(Math.PI / 4);
                ctx.beginPath();
                ctx.arc(0, 0, 200 + (Math.sin(frame*0.01)*50), 0, Math.PI / 2);
                ctx.stroke();
            }
            ctx.restore();

            // Draw Sigil Swarm
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 0, 0, ${p.o})`;
                ctx.font = `${p.s * 8}px serif`;
                ctx.fillText(p.char, p.x, p.y);
                
                p.y += p.vY;
                if(p.y > height) {
                    p.y = -20;
                    p.x = Math.random() * width;
                }
            });

            requestAnimationFrame(draw);
        }

        function awaken() {
            audio.play().catch(e => {});
            document.getElementById('gate').style.transform = 'scale(2)';
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main').style.opacity = '1';
            }, 1000);
            init();
            draw();
        }

        window.onresize = init;
    </script>
</body>
</html>

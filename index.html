<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OHDXNIS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Inter, sans-serif;
  color:white;
  background:#0a0a0a;
}

/* animated background */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle at 20% 20%, #ff2e2e33, transparent 40%),
              radial-gradient(circle at 80% 70%, #2e6bff33, transparent 40%),
              radial-gradient(circle at 50% 50%, #ffffff10, transparent 60%);
  animation:move 12s infinite alternate;
  z-index:-2;
}

@keyframes move{
  from{transform:translate(-10%,-10%) scale(1);}
  to{transform:translate(10%,10%) scale(1.2);}
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container{
  padding:60px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

h1{
  font-size:60px;
  letter-spacing:6px;
  margin:0;
}

.sub{
  opacity:0.6;
  font-size:14px;
}

/* links */
a{
  color:white;
  text-decoration:none;
  opacity:0.7;
  transition:0.2s;
}

a:hover{
  opacity:1;
  transform:translateX(5px);
}

/* layout */
.links{
  display:flex;
  gap:20px;
}

/* soundcloud */
iframe{
  margin-top:20px;
  filter:contrast(1.2);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="container">

  <h1>OHDXNIS</h1>
  <div class="sub">Albanian artist</div>

  <div class="links">
    <a href="https://instagram.com/denis.gjoka_/" target="_blank">Instagram</a>
    <a href="https://youtube.com/@OhDxnis" target="_blank">YouTube</a>
    <a href="https://soundcloud.com/ohdxnis" target="_blank">SoundCloud</a>
  </div>

  <iframe width="100%" height="160" scrolling="no"
  frameborder="no" allow="autoplay"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/ohdxnis&color=%23000000&inverse=false&auto_play=false">
  </iframe>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = Array.from({length:120}, ()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  vx:(Math.random()-0.5)*0.5,
  vy:(Math.random()-0.5)*0.5
}));

let mouse = {x:0,y:0};

addEventListener("mousemove", e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function animate(){

  ctx.fillStyle="rgba(10,10,10,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let p of particles){

    let dx = p.x - mouse.x;
    let dy = p.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 120){
      p.vx += dx*0.001;
      p.vy += dy*0.001;
    }

    p.vx *= 0.96;
    p.vy *= 0.96;

    p.x += p.vx;
    p.y += p.vy;

    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;

    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,2,2);
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

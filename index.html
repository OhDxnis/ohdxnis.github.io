<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | RED OBLIVION</title>
    <style>
        :root {
            --abyss: #000000;
            --blood: #550000;
            --flesh: #ff0000;
            --ui-white: #ffffff;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--abyss);
            color: var(--flesh);
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
        }

        /* --- THE ENTRY SEAL --- */
        #gate {
            position: fixed; inset: 0;
            background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.3s steps(2);
        }
        .gate-sigil {
            font-size: 25vw; color: var(--flesh);
            filter: drop-shadow(0 0 60px var(--flesh));
            animation: ritual-flicker 0.05s infinite;
        }

        /* --- CANVASES --- */
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #abyss { z-index: 1; filter: contrast(2) saturate(2); }
        #drips { z-index: 2; }

        /* --- THE VIEWPORT --- */
        .viewport {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            filter: url(#blood-glitch);
        }

        /* TITLE: SLOW MOTION, RED GLOW */
        .header { text-align: center; margin-bottom: 5vh; }
        
        h1#ritual-title {
            font-family: 'Cinzel', serif;
            font-size: 9vw;
            letter-spacing: 20px;
            color: var(--flesh);
            text-transform: uppercase;
            text-shadow: 0 0 30px var(--blood);
            animation: slow-warp 4s infinite ease-in-out;
        }

        /* --- LINK MATRIX: STARK WHITE & STABLE --- */
        .node-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            z-index: 100;
        }

        .node {
            text-decoration: none;
            display: flex; flex-direction: column; align-items: center;
            transition: 0.1s;
        }

        .node .sigil {
            font-size: 4rem;
            color: var(--flesh);
            margin-bottom: 5px;
            animation: sigil-vibrate 0.1s infinite;
        }

        /* NAMES: PURE WHITE, NO DISTORTION */
        .node .label {
            color: #ffffff !important;
            font-family: 'Arial Black', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: #000;
            padding: 10px 15px;
            border: 3px solid #ff0000;
            filter: none !important; /* Forces readability */
            font-weight: 900;
        }

        .node:hover .label { background: #ffffff; color: #ff0000 !important; border-color: #000; }
        .node:hover .sigil { transform: scale(1.3); filter: brightness(2); }

        /* --- FILTERS --- */
        svg { position: absolute; width: 0; height: 0; }

        @keyframes ritual-flicker { 0% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slow-warp { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(2deg); } }
        @keyframes sigil-vibrate { 0% { transform: translate(1px, -1px); } 50% { transform: translate(-1px, 1px); } }

    </style>
</head>
<body onclick="bloodRitual()">

    <div id="gate">
        <div class="gate-sigil">🜏</div>
    </div>

    <svg>
        <filter id="blood-glitch">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise">
                <animate attributeName="baseFrequency" values="0.01;0.1;0.01" dur="0.1s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" />
        </filter>
    </svg>

    <canvas id="abyss"></canvas>
    <canvas id="drips"></canvas>

    <div class="viewport" id="main">
        <div class="header">
            <h1 id="ritual-title">OHDXNIS</h1>
        </div>

        <div class="node-matrix">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="node">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="node">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="node">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="node">
                <span class="sigil">⛧</span><span class="label">Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="node">
                <span class="sigil">🜔</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="node">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="node">
                <span class="sigil">🜓</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="node">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="node">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="audio" loop>
        <source src="Bleood  type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const abyss = document.getElementById('abyss');
        const drips = document.getElementById('drips');
        const aCtx = abyss.getContext('2d');
        const dCtx = drips.getContext('2d');
        let w, h, frame = 0;
        let particles = [];
        let blood = [];

        const chars = ['⛧','🜏','⸸','𖤐','✕','🜓','🜕','🜔','🜍','🜚','🜛','🜜','🜝','🜞','🜟','🜠','🜡','🜢','🜣','🜤','🜥','🜦','🜧','🜨'];

        function init() {
            w = abyss.width = drips.width = window.innerWidth;
            h = abyss.height = drips.height = window.innerHeight;
            particles = [];
            // 1500 SIGILS FOR MAXIMUM CHAOS
            for(let i=0; i<1500; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    s: Math.random() * 40 + 5,
                    c: chars[Math.floor(Math.random()*chars.length)],
                    vY: Math.random() * 15 + 5,
                    o: Math.random() * 0.5
                });
            }
        }

        function draw() {
            // Abyss Feedback Loop (Never fully clears)
            aCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            aCtx.fillRect(0, 0, w, h);

            particles.forEach(p => {
                aCtx.fillStyle = `rgba(255, 0, 0, ${p.o})`;
                aCtx.font = `${p.s}px serif`;
                aCtx.fillText(p.c, p.x, p.y);
                p.y += p.vY;
                if(p.y > h) { p.y = -50; p.x = Math.random() * w; }
            });

            // Dripping Blood Layer
            dCtx.clearRect(0,0,w,h);
            dCtx.strokeStyle = '#ff0000';
            blood.forEach((d, i) => {
                dCtx.lineWidth = d.w;
                dCtx.beginPath();
                dCtx.moveTo(d.x, d.y);
                dCtx.lineTo(d.x, d.y + d.l);
                dCtx.stroke();
                d.y += d.v;
                if(d.y > h) blood.splice(i, 1);
            });

            if(blood.length < 200) {
                blood.push({ x: Math.random()*w, y: -100, v: Math.random()*30+10, l: Math.random()*200+50, w: Math.random()*4+1 });
            }

            frame++;
            requestAnimationFrame(draw);
        }

        function bloodRitual() {
            document.getElementById('audio').play().catch(()=>{});
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main').style.opacity = '1';
                draw();
            }, 300);
            init();
        }

        window.onresize = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | AD INFINITUM</title>
    <style>
        :root {
            --abyss: #000000;
            --blood: #660000;
            --fresh-blood: #ff0000;
            --font-ritual: 'Georgia', 'Times New Roman', serif;
            --font-ui: 'Impact', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--abyss);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* --- THE TRIGGER (THE SACRIFICE) --- */
        #ritual-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .seal-trigger {
            font-size: 250px; color: var(--fresh-blood);
            filter: drop-shadow(0 0 50px var(--blood));
            animation: ritual-flicker 0.05s infinite;
            cursor: pointer;
        }
        #ritual-gate p { 
            color: #fff; letter-spacing: 20px; font-size: 12px; 
            margin-top: 50px; opacity: 0.8; font-family: monospace; 
            text-shadow: 0 0 10px red;
        }

        /* --- THE CHAOS ENGINE CANVAS --- */
        #chaos-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- UI VIEWPORT --- */
        .viewport {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            opacity: 0; transition: opacity 0.5s ease;
        }

        /* THE TITLE: RGB SPLIT & VIOLENT SHIVER */
        .title-ritual { 
            text-align: center; margin-bottom: 2vh; 
            position: relative;
        }
        
        h1#sinister-title {
            font-family: var(--font-ritual);
            font-size: 20vw;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -18px;
            color: #fff;
            text-transform: uppercase;
            line-height: 0.75;
            position: relative;
            animation: violent-shiver 0.08s infinite;
        }

        /* RGB Split Layers */
        h1#sinister-title::before, h1#sinister-title::after {
            content: 'OHDXNIS';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }
        h1#sinister-title::before { color: #f0f; left: -5px; animation: glitch-rgb 0.2s infinite; }
        h1#sinister-title::after { color: #0ff; left: 5px; animation: glitch-rgb 0.1s infinite reverse; }

        .subtitle {
            color: var(--fresh-blood);
            font-size: 2rem;
            letter-spacing: 2.8rem;
            font-weight: 900;
            margin-top: -10px;
            text-shadow: 0 0 30px var(--fresh-blood), 0 0 5px white;
            animation: flicker 0.1s infinite;
        }

        /* --- THE LINKS: CRYSTAL CLEAR NODES --- */
        .matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            z-index: 100;
        }

        .altar {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid var(--blood);
            padding: 25px 40px;
            text-decoration: none;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 -10px 20px var(--blood);
        }

        .altar .sigil {
            font-size: 4.5rem; color: var(--blood);
            margin-bottom: 5px;
            filter: drop-shadow(0 0 10px red);
            animation: slow-rotate 4s infinite linear;
        }

        /* SHARP & READABLE LABELS */
        .altar .label {
            color: #ffffff;
            font-family: var(--font-ui);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000, 0 0 10px rgba(255,255,255,0.5);
            z-index: 101;
            filter: none !important;
        }

        .altar:hover {
            border-color: #fff;
            background: #200;
            transform: scale(1.1) rotate(2deg);
        }
        .altar:hover .sigil { color: #fff; animation: ritual-flicker 0.02s infinite; }

        /* --- FULL SCREEN OVERLAYS --- */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.05);
            pointer-events: none; z-index: 200;
            mix-blend-mode: color-burn;
            animation: flash 5s infinite;
        }

        /* --- ANIMATIONS --- */
        @keyframes ritual-flicker { 0% { opacity: 0.1; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        @keyframes flicker { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.9; } }
        @keyframes slow-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        @keyframes violent-shiver {
            0% { transform: translate(0,0) skew(0deg); }
            20% { transform: translate(-8px, 4px) skew(5deg); }
            40% { transform: translate(8px, -4px) skew(-5deg); }
            60% { transform: translate(-4px, -2px) skew(2deg); }
            80% { transform: translate(4px, 2px) skew(-2deg); }
            100% { transform: translate(0,0) skew(0deg); }
        }

        @keyframes glitch-rgb {
            0% { transform: translate(0); }
            20% { transform: translate(-10px, 5px); }
            40% { transform: translate(10px, -5px); }
            100% { transform: translate(0); }
        }

        @keyframes flash {
            0%, 90%, 100% { background: transparent; }
            92% { background: rgba(255, 255, 255, 0.1); }
            94% { background: rgba(255, 0, 0, 0.2); }
            96% { background: rgba(0, 255, 255, 0.1); }
        }

    </style>
</head>
<body>

    <div id="ritual-gate" onclick="initiate()">
        <div class="seal-trigger">🜏</div>
        <p>SACRIFICE YOUR SENSES</p>
    </div>

    <div id="glitch-overlay"></div>
    <canvas id="chaos-canvas"></canvas>

    <div class="viewport" id="ui">
        <div class="title-ritual">
            <h1 id="sinister-title">OHDXNIS</h1>
            <p class="subtitle">AD INFINITUM</p>
        </div>

        <div class="matrix">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="altar">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="altar">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="altar">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="altar">
                <span class="sigil">⛧</span><span class="label">Wiki Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="altar">
                <span class="sigil">🜔</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="altar">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="altar">
                <span class="sigil">🜍</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="altar">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="altar">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="wire-audio" loop>
        <source src="Bleood  type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('wire-audio');
        const canvas = document.getElementById('chaos-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, frame = 0;
        let bloodParticles = [];
        let mouse = { x: -1000, y: -1000 };

        function setup() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            bloodParticles = [];
            
            // Generate 666 Particles for the Legion
            for(let i=0; i<666; i++) {
                bloodParticles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 4 + 1,
                    speed: Math.random() * 15 + 5,
                    char: ['⛧', '🜏', '⸸', '𖤐', '🜓', '🜕', '🜔', '🜍', '✕', '🜚'][Math.floor(Math.random()*10)],
                    opacity: Math.random(),
                    drift: (Math.random() - 0.5) * 5
                });
            }
        }

        function draw() {
            // BLOODY PERSISTENCE: We don't clear the whole screen, creating a smear effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            frame++;

            // Draw Alchemical Seal in Background
            ctx.save();
            ctx.translate(width/2, height/2);
            ctx.rotate(frame * 0.005);
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.15)';
            ctx.lineWidth = 2;
            for(let i=0; i<7; i++) {
                ctx.rotate((Math.PI * 2) / 7);
                ctx.beginPath();
                ctx.moveTo(0, -height);
                ctx.lineTo(0, height);
                ctx.stroke();
                
                // Pulsating Pentagram Lines
                ctx.beginPath();
                ctx.arc(0, 0, (Math.sin(frame*0.02) * 100) + 300, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();

            // Draw Smearing Blood Particles
            bloodParticles.forEach(p => {
                ctx.fillStyle = `rgba(${Math.random() > 0.9 ? 255 : 100}, 0, 0, ${p.opacity})`;
                ctx.font = `${p.size * 10}px serif`;
                ctx.fillText(p.char, p.x, p.y);
                
                // Connecting Blood Wires to Cursor
                let dist = Math.hypot(p.x - mouse.x, p.y - mouse.y);
                if(dist < 300) {
                    ctx.strokeStyle = `rgba(255, 0, 0, ${1 - dist/300})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }

                p.y += p.speed;
                p.x += p.drift;

                // Reset and Loop
                if(p.y > height) {
                    p.y = -50;
                    p.x = Math.random() * width;
                }
            });

            // Random Full Screen Flash Distortion
            if(Math.random() > 0.99) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fillRect(0, 0, width, height);
            }

            requestAnimationFrame(draw);
        }

        function initiate() {
            audio.play().catch(e => console.error("Ritual Audio Blocked:", e));

            // Kill Gate
            document.getElementById('ritual-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ritual-gate').style.display = 'none';
                document.getElementById('ui').style.opacity = '1';
            }, 500);

            setup();
            draw();
        }

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.onresize = setup;
    </script>
</body>
</html>

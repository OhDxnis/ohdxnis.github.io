<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | AD INFINITUM</title>
    <style>
        :root {
            --abyss: #020000;
            --blood: #660000;
            --fresh-blood: #ff0000;
            --ui-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            text-transform: uppercase;
        }

        /* --- THE INFERNAL SEAL (Click to Start) --- */
        #ritual-seal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 1, 1), visibility 1.2s;
        }
        #ritual-seal .seal-icon { font-size: 120px; color: var(--blood); animation: seal-pulse 2s infinite; }
        #ritual-seal p { color: var(--fresh-blood); font-size: 0.7rem; letter-spacing: 5px; margin-top: 20px; }

        /* --- BACKGROUND LAYERS --- */
        #chaos-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .blood-vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(50, 0, 0, 0.8) 100%);
            z-index: 2; pointer-events: none;
        }

        /* --- CONTENT VIEWPORT --- */
        .viewport {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            opacity: 0; transition: opacity 2s ease;
        }

        /* SINISTER TITLE: FRAXURED & JAGGED */
        .title-block { text-align: center; margin-bottom: 5vh; }
        
        h1#ritual-title {
            font-family: 'Times New Roman', serif;
            font-size: 13vw;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -8px;
            color: #fff;
            line-height: 0.8;
            text-shadow: 6px 6px 0px var(--blood), -2px -2px 0px #000;
            filter: url(#fracture-filter);
            animation: violent-shake 5s infinite;
        }

        .subtitle {
            color: var(--fresh-blood);
            font-size: 1.1rem;
            letter-spacing: 1.2rem;
            margin-top: 10px;
            text-shadow: 0 0 15px var(--fresh-blood);
            font-weight: bold;
        }

        /* --- LEGIBLE LINK MATRIX --- */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            z-index: 20;
            max-width: 1000px;
        }

        .altar-link {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #220000;
            padding: 25px 35px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.1s ease;
        }

        .altar-link .sigil { 
            font-size: 2.2rem; 
            color: var(--blood); 
            margin-bottom: 8px; 
            transition: color 0.1s, transform 0.1s;
        }
        
        /* THE NAMES: ZERO DISTORTION - HIGH READABILITY */
        .altar-link .label {
            color: var(--ui-white);
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 2px;
            filter: none !important; /* Block any parent filters */
            opacity: 1;
        }

        .altar-link:hover {
            border-color: var(--fresh-blood);
            background: #150000;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        .altar-link:hover .sigil {
            color: #fff;
            transform: scale(1.2) rotate(5deg);
        }

        /* --- ANIMATIONS & FILTERS --- */
        @keyframes seal-pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        
        @keyframes violent-shake {
            0%, 100% { transform: translate(0,0); }
            1% { transform: translate(-5px, 2px) skewX(5deg); }
            2% { transform: translate(5px, -2px) skewX(-5deg); }
            3% { transform: translate(0,0); }
        }

        svg { position: absolute; width: 0; height: 0; }
    </style>
</head>
<body onclick="descend()">

    <div id="ritual-seal">
        <div class="seal-icon">⛧</div>
        <p>AWAKEN THE WIRES</p>
    </div>

    <svg>
        <filter id="fracture-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="1" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" />
        </filter>
    </svg>

    <canvas id="chaos-canvas"></canvas>
    <div class="blood-vignette"></div>

    <div class="viewport" id="ui-container">
        <div class="title-block">
            <h1 id="ritual-title">OHDXNIS</h1>
            <p class="subtitle">AD INFINITUM</p>
        </div>

        <div class="link-grid">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="altar-link">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="altar-link">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="altar-link">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="altar-link">
                <span class="sigil">🜔</span><span class="label">Wiki Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="altar-link">
                <span class="sigil">🜍</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="altar-link">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="altar-link">
                <span class="sigil">🜓</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="altar-link">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="altar-link">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="wire-audio" loop>
        <source src="Bleood type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('wire-audio');
        const seal = document.getElementById('ritual-seal');
        const ui = document.getElementById('ui-container');
        const canvas = document.getElementById('chaos-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let bloodDrops = [];
        let chaosParticles = [];
        let mouse = { x: -100, y: -100 };
        const satanicSymbols = ['⛧', '🜏', '⸸', '𖤐', '†'];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Blood Engine Setup
            for(let i=0; i<100; i++) {
                bloodDrops.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    len: Math.random() * 50 + 20,
                    spd: Math.random() * 4 + 2,
                    w: Math.random() * 2 + 1
                });
            }

            // Chaos Particle Setup
            for(let i=0; i<30; i++) {
                chaosParticles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    char: satanicSymbols[Math.floor(Math.random()*satanicSymbols.length)],
                    vX: (Math.random() - 0.5) * 2,
                    vY: (Math.random() - 0.5) * 2,
                    size: Math.random() * 20 + 10
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw Blood Drips
            ctx.fillStyle = '#4a0000';
            bloodDrops.forEach(d => {
                ctx.fillRect(d.x, d.y, d.w, d.len);
                d.y += d.spd;
                if(d.y > height) { d.y = -60; d.x = Math.random() * width; }
            });

            // Draw Escaping Sigils
            ctx.font = '20px serif';
            chaosParticles.forEach(p => {
                ctx.fillStyle = 'rgba(100, 0, 0, 0.3)';
                ctx.fillText(p.char, p.x, p.y);
                p.x += p.vX; p.y += p.vY;
                if(p.x < 0 || p.x > width) p.vX *= -1;
                if(p.y < 0 || p.y > height) p.vY *= -1;
            });

            // Cursor Distortion Aura
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 60, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
            ctx.fill();

            requestAnimationFrame(draw);
        }

        function descend() {
            // Initiate Audio
            audio.play().catch(err => console.log("Audio Wake Failed: ", err));
            
            // Fade Seal
            seal.style.opacity = '0';
            setTimeout(() => {
                seal.style.visibility = 'hidden';
                ui.style.opacity = '1';
            }, 1000);

            init();
            draw();
        }

        window.addEventListener('resize', init);

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Parallax for link matrix
            const moveX = (e.clientX / width - 0.5) * 40;
            const moveY = (e.clientY / height - 0.5) * 40;
            document.querySelector('.link-grid').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        console.log("%cWIRES AWAKENED. OHDXNIS: AD INFINITUM.", "color: #ff0000; font-weight: bold; font-size: 20px; text-shadow: 2px 2px black;");
    </script>
</body>
</html>

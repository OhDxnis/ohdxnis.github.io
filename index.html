<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | AD INFINITUM</title>
    <style>
        :root {
            --abyss: #010000;
            --blood-deep: #4d0000;
            --blood-neon: #ff0000;
            --font-ritual: 'Georgia', 'Times New Roman', serif;
            --font-clean: 'Arial Black', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--abyss);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* --- THE INITIATION SCREEN (Required for Audio) --- */
        #ritual-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .seal-trigger {
            font-size: 200px; color: var(--blood-neon);
            text-shadow: 0 0 50px var(--blood-deep);
            animation: ritual-flicker 0.1s infinite;
            cursor: pointer;
        }
        #ritual-gate p { 
            color: #fff; letter-spacing: 15px; font-size: 10px; 
            margin-top: 40px; opacity: 0.5; font-family: monospace; 
        }

        /* --- THE ESOTERIC CANVAS --- */
        #chaos-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- MAIN INTERFACE --- */
        .viewport {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            opacity: 0; transition: opacity 2s ease;
        }

        /* SATANIC TITLE (No Wobble, Just Menace) */
        .title-ritual { text-align: center; margin-bottom: 5vh; position: relative; }
        
        h1#sinister-title {
            font-family: var(--font-ritual);
            font-size: 16vw;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -12px;
            color: #fff;
            text-transform: uppercase;
            line-height: 0.8;
            /* Layered shadow creates "carved into screen" effect */
            text-shadow: 
                0 0 10px rgba(255,0,0,0.8),
                5px 5px 0px var(--blood-deep),
                -2px -2px 0px #000;
            animation: violent-shiver 0.15s infinite;
        }

        .subtitle {
            color: var(--blood-neon);
            font-size: 1.5rem;
            letter-spacing: 2.2rem;
            font-weight: bold;
            margin-top: -20px;
            text-shadow: 0 0 15px var(--blood-neon);
        }

        /* --- THE MATRIX (SHARP & READABLE) --- */
        .matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            z-index: 50;
        }

        .altar {
            background: rgba(0,0,0,0.95);
            border: 1px solid #300;
            padding: 30px 45px;
            text-decoration: none;
            display: flex; flex-direction: column; align-items: center;
            transition: 0.1s;
        }

        .altar .sigil {
            font-size: 3.5rem; color: var(--blood-deep);
            margin-bottom: 10px;
            transition: color 0.1s;
        }

        /* SHARP LABELS (NO DISTORTION) */
        .altar .label {
            color: #ffffff;
            font-family: var(--font-clean);
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
            filter: none !important;
        }

        .altar:hover {
            border-color: #fff;
            background: var(--blood-deep);
            transform: scale(1.05);
        }
        .altar:hover .sigil { 
            color: var(--blood-neon); 
            animation: ritual-flicker 0.05s infinite; 
        }

        /* --- KEYFRAMES --- */
        @keyframes ritual-flicker { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        
        @keyframes violent-shiver {
            0% { transform: translate(0,0); }
            25% { transform: translate(-3px, 1px); }
            50% { transform: translate(3px, -1px); }
            75% { transform: translate(-1px, 2px); }
            100% { transform: translate(0,0); }
        }

    </style>
</head>
<body>

    <div id="ritual-gate" onclick="initiate()">
        <div class="seal-trigger">🜏</div>
        <p>TAP TO UNLOCK THE WIRES</p>
    </div>

    <canvas id="chaos-canvas"></canvas>

    <div class="viewport" id="ui">
        <div class="title-ritual">
            <h1 id="sinister-title">OHDXNIS</h1>
            <p class="subtitle">AD INFINITUM</p>
        </div>

        <div class="matrix">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="altar">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="altar">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="altar">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="altar">
                <span class="sigil">⛧</span><span class="label">Wiki Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="altar">
                <span class="sigil">🜔</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="altar">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="altar">
                <span class="sigil">🜍</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="altar">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="altar">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="wire-audio" loop>
        <source src="Bleood  type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('wire-audio');
        const canvas = document.getElementById('chaos-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, frame = 0;
        let bloodParticles = [];
        let mouse = { x: -500, y: -500 };

        function setup() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            bloodParticles = [];
            
            // Generate Sigil Storm
            for(let i=0; i<250; i++) {
                bloodParticles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 4 + 2,
                    char: ['⛧', '🜏', '⸸', '𖤐', '🜓', '🜕', '🜔', '🜍'][Math.floor(Math.random()*8)],
                    opacity: Math.random() * 0.5
                });
            }
        }

        function draw() {
            // Motion Blur Feedback Loop
            ctx.fillStyle = 'rgba(1, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            frame++;

            // Draw Alchemical Geometry in background
            ctx.save();
            ctx.translate(width/2, height/2);
            ctx.rotate(frame * 0.001);
            ctx.strokeStyle = 'rgba(77, 0, 0, 0.15)';
            ctx.lineWidth = 1;
            for(let i=0; i<12; i++) {
                ctx.rotate(Math.PI / 6);
                ctx.beginPath();
                ctx.moveTo(-width, 0);
                ctx.lineTo(width, 0);
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(100, 0, 0, 0.05)';
                ctx.font = '50px serif';
                ctx.fillText('🜏', width/4, 0);
            }
            ctx.restore();

            // Draw Blood Sigils & Connection Wires
            bloodParticles.forEach(p => {
                ctx.fillStyle = `rgba(255, 0, 0, ${p.opacity})`;
                ctx.font = `${p.size * 12}px serif`;
                ctx.fillText(p.char, p.x, p.y);
                
                // Cursor Interaction (The Wires)
                let dist = Math.hypot(p.x - mouse.x, p.y - mouse.y);
                if(dist < 250) {
                    ctx.strokeStyle = `rgba(255, 0, 0, ${1 - dist/250})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }

                p.y += p.speed;
                if(p.y > height) p.y = -50;
            });

            requestAnimationFrame(draw);
        }

        function initiate() {
            // Forced Audio Context Unlock
            audio.play().catch(err => console.log("Audio Ritual Blocked: ", err));

            // Remove Gate
            document.getElementById('ritual-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ritual-gate').style.display = 'none';
                document.getElementById('ui').style.opacity = '1';
            }, 1000);

            setup();
            draw();
        }

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.onresize = setup;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | TOTAL CHAOS</title>
    <style>
        :root {
            --abyss: #000000;
            --blood: #500000;
            --fresh: #ff0000;
            --font-ritual: 'Cinzel', serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--abyss);
            color: #fff;
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
        }

        /* --- THE SACRIFICE GATE --- */
        #gate {
            position: fixed; inset: 0;
            background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s steps(4);
        }
        .gate-sigil {
            font-size: 15vw; color: var(--fresh);
            filter: drop-shadow(0 0 50px red);
            animation: ritual-flicker 0.1s infinite;
        }

        /* --- THE CHAOS ENGINE --- */
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #abyss { z-index: 1; filter: contrast(1.5) brightness(0.8); }
        #blood-rain { z-index: 2; mix-blend-mode: screen; }

        /* --- THE VIEWPORT --- */
        .viewport {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
        }

        /* TITLE: SLOW, HEAVY, OMINOUS */
        .title-container {
            text-align: center;
            margin-bottom: 8vh;
            position: relative;
        }
        
        h1#ritual-title {
            font-family: 'Cinzel', serif;
            font-size: 7vw;
            letter-spacing: 30px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--fresh);
            animation: slow-sway 6s infinite ease-in-out;
        }

        /* --- THE NODES: RAZOR SHARP & STABLE --- */
        .node-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            z-index: 100;
        }

        .node {
            text-decoration: none;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.1s;
        }

        .node .sigil {
            font-size: 3.5rem;
            color: var(--blood);
            margin-bottom: 5px;
            /* High-speed individual jitter */
            animation: jitter 0.2s infinite;
        }

        /* PURE WHITE STABLE LABELS */
        .node .label {
            color: #ffffff !important;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 900;
            background: #000;
            padding: 5px 10px;
            border: 1px solid var(--blood);
            filter: none !important;
        }

        .node:hover { transform: scale(1.1); }
        .node:hover .sigil { color: var(--fresh); animation: ritual-flicker 0.05s infinite; }
        .node:hover .label { border-color: #fff; background: var(--blood); }

        /* --- ANIMATIONS --- */
        @keyframes ritual-flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        
        @keyframes slow-sway {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        @keyframes jitter {
            0% { transform: translate(0,0); }
            50% { transform: translate(2px, -2px); }
            100% { transform: translate(-1px, 1px); }
        }

        /* Random screen tear effect */
        #glitch-overlay {
            position: fixed; inset: 0;
            background: transparent;
            z-index: 50; pointer-events: none;
            animation: tear 4s infinite;
        }

        @keyframes tear {
            0%, 95%, 100% { box-shadow: none; }
            96% { box-shadow: inset 0 20px 0 red, inset 0 -20px 0 red; transform: translateX(10px); }
            98% { box-shadow: inset 20px 0 0 white; transform: translateX(-10px); }
        }

    </style>
</head>
<body onclick="startRitual()">

    <div id="gate">
        <div class="gate-sigil">🜏</div>
    </div>

    <div id="glitch-overlay"></div>
    <canvas id="abyss"></canvas>
    <canvas id="blood-rain"></canvas>

    <div class="viewport" id="main">
        <div class="title-container">
            <h1 id="ritual-title">OHDXNIS</h1>
        </div>

        <div class="node-matrix">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="node">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="node">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="node">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="node">
                <span class="sigil">⛧</span><span class="label">Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="node">
                <span class="sigil">🜔</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="node">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="node">
                <span class="sigil">🜓</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="node">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="node">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="ritual-audio" loop>
        <source src="Bleood  type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const abyss = document.getElementById('abyss');
        const rain = document.getElementById('blood-rain');
        const aCtx = abyss.getContext('2d');
        const rCtx = rain.getContext('2d');
        let w, h, frame = 0;
        let sigils = [];
        let drops = [];

        const occultChars = ['⛧','🜏','⸸','𖤐','✕','🜓','🜕','🜔','🜍','🜚','🜛','🜜','🜝','🜞','🜟','🜠','🜡','🜢','🜣','🜤','🜥','🜦','🜧','🜨','🜨'];

        function init() {
            w = abyss.width = rain.width = window.innerWidth;
            h = abyss.height = rain.height = window.innerHeight;
            sigils = [];
            // MASSIVE SIGIL COUNT
            for(let i=0; i<400; i++) {
                sigils.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    s: Math.random() * 30 + 10,
                    char: occultChars[Math.floor(Math.random() * occultChars.length)],
                    vR: (Math.random() - 0.5) * 0.1,
                    angle: Math.random() * Math.PI * 2,
                    o: Math.random() * 0.5
                });
            }
        }

        function createDrop() {
            drops.push({
                x: Math.random() * w,
                y: -50,
                vY: Math.random() * 20 + 10,
                l: Math.random() * 40 + 20,
                w: Math.random() * 3 + 1
            });
        }

        function draw() {
            // Abyss Trail
            aCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            aCtx.fillRect(0, 0, w, h);

            sigils.forEach(s => {
                aCtx.save();
                aCtx.translate(s.x, s.y);
                aCtx.rotate(s.angle);
                aCtx.fillStyle = `rgba(150, 0, 0, ${s.o})`;
                aCtx.font = `${s.s}px serif`;
                aCtx.fillText(s.char, 0, 0);
                aCtx.restore();
                
                s.angle += s.vR;
                if(Math.random() > 0.99) s.char = occultChars[Math.floor(Math.random() * occultChars.length)];
            });

            // Blood Rain
            rCtx.clearRect(0, 0, w, h);
            rCtx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
            drops.forEach((d, i) => {
                rCtx.lineWidth = d.w;
                rCtx.beginPath();
                rCtx.moveTo(d.x, d.y);
                rCtx.lineTo(d.x, d.y + d.l);
                rCtx.stroke();
                d.y += d.vY;
                if(d.y > h) drops.splice(i, 1);
            });

            if(drops.length < 100) createDrop();

            frame++;
            requestAnimationFrame(draw);
        }

        function startRitual() {
            document.getElementById('ritual-audio').play().catch(()=>{});
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main').style.opacity = '1';
                draw();
            }, 500);
            init();
        }

        window.onresize = init;
    </script>
</body>
</html>

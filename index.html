<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | AD INFINITUM</title>
    <style>
        :root {
            --black: #000000;
            --deep-blood: #4a0000;
            --bright-blood: #ff0000;
            --gold-corrupt: #444400;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--black);
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- THE UNLOCK SEAL --- */
        #ritual-seal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1.5s cubic-bezier(0.9, 0, 0.1, 1);
        }
        #ritual-seal .gate-icon { 
            font-size: 150px; color: var(--bright-blood); 
            filter: drop-shadow(0 0 30px var(--bright-blood));
            animation: gate-pulse 0.6s infinite alternate;
            cursor: pointer;
        }
        #ritual-seal p { color: var(--bright-blood); margin-top: 20px; letter-spacing: 10px; font-weight: bold; }

        /* --- THE ABYSS CANVAS --- */
        #abyss-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- VIEWPORT ARCHITECTURE --- */
        .viewport {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            opacity: 0; transform: scale(1.2);
            transition: opacity 3s ease, transform 5s ease;
        }

        /* EXTREME DISTORTION TITLE */
        .header-ritual { text-align: center; margin-bottom: 30px; filter: url(#chaos-filter); }
        
        h1#main-title {
            font-family: 'Times New Roman', serif;
            font-size: 16vw;
            font-weight: 900;
            font-style: italic;
            color: #fff;
            text-shadow: 8px 8px 0px var(--deep-blood), -2px -2px 20px var(--bright-blood);
            letter-spacing: -10px;
            animation: violent-vibration 0.1s infinite;
        }

        .subtitle {
            color: var(--bright-blood);
            font-size: 1.5rem;
            letter-spacing: 2rem;
            text-shadow: 0 0 15px var(--bright-blood);
            margin-top: -20px;
            font-weight: 900;
        }

        /* --- THE MATRIX OF ALTARS --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            z-index: 20;
        }

        .altar-box {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid var(--deep-blood);
            padding: 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: 0.1s;
        }

        .altar-box .sigil-icon {
            font-size: 3.5rem;
            color: var(--bright-blood);
            margin-bottom: 10px;
            filter: url(#chaos-filter); /* ICONS DISTORTED */
            animation: slow-sway 3s infinite alternate;
        }

        /* READABLE NAMES: NO DISTORTION */
        .altar-box .label {
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            filter: none !important; /* Forces clarity */
        }

        .altar-box:hover {
            background: var(--deep-blood);
            border-color: #fff;
            transform: scale(1.1) rotate(2deg);
            z-index: 50;
        }

        /* --- SVG CHAOS FILTERS --- */
        svg.filter-bank { position: absolute; width: 0; height: 0; }

        @keyframes gate-pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.1); opacity: 1; } }
        @keyframes violent-vibration {
            0% { transform: translate(0,0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
        @keyframes slow-sway { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

    </style>
</head>
<body>

    <div id="ritual-seal" onclick="breakSeal()">
        <div class="gate-icon">⛧</div>
        <p>CLICK TO BLEED</p>
    </div>

    <svg class="filter-bank">
        <filter id="chaos-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise">
                <animate attributeName="baseFrequency" values="0.9;0.95;0.9" dur="0.1s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" />
        </filter>
    </svg>

    <canvas id="abyss-canvas"></canvas>

    <div class="viewport" id="ui">
        <div class="header-ritual">
            <h1 id="main-title">OHDXNIS</h1>
            <p class="subtitle">AD INFINITUM</p>
        </div>

        <div class="grid-container">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="altar-box">
                <span class="sigil-icon">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="altar-box">
                <span class="sigil-icon">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="altar-box">
                <span class="sigil-icon">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="altar-box">
                <span class="sigil-icon">⛧</span><span class="label">Wiki Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="altar-box">
                <span class="sigil-icon">🜍</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="altar-box">
                <span class="sigil-icon">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="altar-box">
                <span class="sigil-icon">🜓</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="altar-box">
                <span class="sigil-icon">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="altar-box">
                <span class="sigil-icon">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="audio-track" loop>
        <source src="Bleood type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio-track');
        const canvas = document.getElementById('abyss-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let bloodDrops = [];
        let esotericFloating = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Generate massive amounts of blood
            for(let i=0; i<150; i++) {
                bloodDrops.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    h: Math.random() * 100 + 50,
                    w: Math.random() * 3 + 1,
                    s: Math.random() * 8 + 4
                });
            }
            
            // Generate floating sigils
            const icons = ['⛧', '🜏', '⸸', '𖤐', '🜓', '🜕', '🜔', '🜍'];
            for(let i=0; i<60; i++) {
                esotericFloating.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    char: icons[Math.floor(Math.random()*icons.length)],
                    vX: (Math.random() - 0.5) * 4,
                    vY: (Math.random() - 0.5) * 4,
                    o: Math.random() * 0.5
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Motion blur trail
            ctx.fillRect(0, 0, width, height);

            // Draw Blood
            ctx.fillStyle = '#ff0000';
            bloodDrops.forEach(d => {
                ctx.fillRect(d.x, d.y, d.w, d.h);
                d.y += d.s;
                if(d.y > height) { d.y = -100; d.x = Math.random() * width; }
            });

            // Draw floating sigils
            esotericFloating.forEach(p => {
                ctx.fillStyle = `rgba(255, 0, 0, ${p.o})`;
                ctx.font = '30px serif';
                ctx.fillText(p.char, p.x, p.y);
                p.x += p.vX; p.y += p.vY;
                if(p.x < 0 || p.x > width) p.vX *= -1;
                if(p.y < 0 || p.y > height) p.vY *= -1;
            });

            requestAnimationFrame(draw);
        }

        function breakSeal() {
            // Unlocking Audio
            audio.volume = 1.0;
            audio.play().then(() => {
                console.log("Audio flowing...");
            }).catch(e => {
                console.error("Audio block:", e);
                // Fallback for some browsers: try playing again
                audio.play();
            });

            // Transition UI
            document.getElementById('ritual-seal').style.opacity = '0';
            document.getElementById('ritual-seal').style.transform = 'scale(5) rotate(45deg)';
            setTimeout(() => {
                document.getElementById('ritual-seal').style.display = 'none';
                document.getElementById('ui').style.opacity = '1';
                document.getElementById('ui').style.transform = 'scale(1)';
            }, 1000);

            init();
            draw();
        }

        window.addEventListener('resize', init);

        // Mouse Parallax
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / width - 0.5) * 50;
            const y = (e.clientY / height - 0.5) * 50;
            document.getElementById('ui').style.marginLeft = x + 'px';
            document.getElementById('ui').style.marginTop = y + 'px';
        });
    </script>
</body>
</html>

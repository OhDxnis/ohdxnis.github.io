<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OhDxnis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #0a0a0f, #000000);
  font-family: Arial, sans-serif;
  color: white;
}

/* noise background */
#noise {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url("https://www.transparenttextures.com/patterns/noise.png");
  opacity: 0.05;
  pointer-events: none;
}

/* main text */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

h1 {
  font-size: 60px;
  letter-spacing: 6px;
  margin: 0;
}

p {
  opacity: 0.6;
}

/* links */
.links {
  margin-top: 20px;
}

a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
  opacity: 0.7;
}

a:hover {
  opacity: 1;
}

/* cursor glow */
#cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: white;
  mix-blend-mode: difference;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: transform 0.05s linear;
}

/* start button */
#start {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border: 1px solid white;
  cursor: pointer;
  opacity: 0.7;
}

#start:hover {
  opacity: 1;
}
</style>
</head>

<body>

<div id="noise"></div>
<div id="cursor"></div>

<div class="center">
  <h1>OHDXNIS</h1>
  <p>First albanian to do it</p>

  <div class="links">
    <a href="https://www.instagram.com/denis.gjoka_/" target="_blank">instagram</a>
    <a href="https://www.youtube.com/@OhDxnis" target="_blank">youtube</a>
    <a href="https://soundcloud.com/ohdxnis" target="_blank">soundcloud</a>
  </div>
</div>

<div id="start">CLICK TO ENTER</div>

<audio id="audio" loop>
  <source src="New_Project (45).mp3" type="audio/mpeg">
</audio>

<script>
// cursor follow
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// music start
const audio = document.getElementById("audio");
const start = document.getElementById("start");

start.addEventListener("click", () => {
  audio.play();
  start.style.display = "none";
});
</script>

</body>
</html>

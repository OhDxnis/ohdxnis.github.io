<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OHDXNIS</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
  color:white;
  background:#111;
}

/* STRONG animated background */
body{
  background: linear-gradient(120deg, #ff003c, #0011ff, #000000);
  background-size: 600% 600%;
  animation: bg 10s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

#ui{
  position:fixed;
  top:40px;
  left:40px;
}

h1{
  font-size:60px;
  margin:0;
}

a{
  display:block;
  color:white;
  margin-top:10px;
  opacity:0.8;
  text-decoration:none;
}

a:hover{opacity:1;}

#start{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:10;
  cursor:pointer;
  font-size:20px;
  letter-spacing:4px;
}
</style>
</head>

<body>

<div id="start">CLICK TO START</div>

<div id="ui">
  <h1>OHDXNIS</h1>
  <a href="https://instagram.com/denis.gjoka_/" target="_blank">Instagram</a>
  <a href="https://youtube.com/@OhDxnis" target="_blank">YouTube</a>
  <a href="https://soundcloud.com/ohdxnis" target="_blank">SoundCloud</a>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let particles = [];

for(let i=0;i<200;i++){
  particles.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2
  });
}

let mouse={x:0,y:0};

addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,c.width,c.height);

  for(let p of particles){

    let dx=p.x-mouse.x;
    let dy=p.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<150){
      p.x+=dx*0.01;
      p.y+=dy*0.01;
    }

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>c.width)p.vx*=-1;
    if(p.y<0||p.y>c.height)p.vy*=-1;

    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,3,3);
  }

  requestAnimationFrame(draw);
}
draw();

/* AUDIO FIX */
let audio = new Audio("New_Project (45).mp3"); // PUT YOUR FILE HERE
audio.loop = true;
audio.volume = 0.8;

document.getElementById("start").onclick = async () => {
  document.getElementById("start").style.display="none";

  audio.play();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | AD INFINITUM</title>
    <style>
        :root {
            --bg: #1a0000;
            --blood-neon: #ff0000;
            --blood-pale: #ff4d4d;
            --font-ritual: 'Cinzel', serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--bg);
            color: #fff;
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
        }

        /* --- THE SACRIFICIAL GATE --- */
        #gate {
            position: fixed; inset: 0;
            background: #fff; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s steps(2);
        }
        .gate-sigil {
            font-size: 20vw; color: #000;
            animation: ritual-flicker 0.05s infinite;
        }

        /* --- THE CHAOS ENGINES --- */
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #abyss { z-index: 1; filter: saturate(2) contrast(1.5); }
        #blood-rain { z-index: 2; mix-blend-mode: color-dodge; }

        /* --- THE VIEWPORT (DISPLACED) --- */
        .viewport {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            /* Constant high-frequency displacement */
            filter: url(#massive-distort);
        }

        /* TITLE: LIGHTER, BRIGHTER, VIOLENT */
        .title-box {
            text-align: center;
            margin-bottom: 5vh;
            position: relative;
        }
        
        h1#ritual-title {
            font-family: 'Cinzel', serif;
            font-size: 9vw;
            letter-spacing: 20px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 10px 0px 0px rgba(255,0,0,0.8), -10px 0px 0px rgba(0,255,255,0.8);
            animation: title-shred 0.1s infinite;
        }

        /* --- THE NODES: RAZOR SHARP STABILITY --- */
        .node-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            z-index: 100;
        }

        .node {
            text-decoration: none;
            display: flex; flex-direction: column; align-items: center;
            transition: 0.1s;
        }

        .node .sigil {
            font-size: 4.5rem;
            color: var(--blood-neon);
            margin-bottom: 5px;
            text-shadow: 0 0 20px #ff0000;
            animation: spin-chaos 0.5s infinite linear;
        }

        /* WHITE STABLE NAMES */
        .node .label {
            color: #ffffff !important;
            font-family: 'Arial Black', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: #000;
            padding: 8px 12px;
            border: 2px solid #fff;
            filter: none !important;
            box-shadow: 5px 5px 0px #ff0000;
        }

        .node:hover { transform: scale(1.2) rotate(5deg); }
        .node:hover .label { background: #fff; color: #000 !important; box-shadow: -5px -5px 0px #000; }

        /* --- SVG CHAOS FILTERS --- */
        svg { position: absolute; width: 0; height: 0; }

        @keyframes ritual-flicker { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0; transform: scale(1.1); } }
        
        @keyframes title-shred {
            0% { transform: translate(2px, -2px) skewX(5deg); }
            50% { transform: translate(-2px, 2px) skewX(-5deg); filter: invert(1); }
            100% { transform: translate(0,0) skewX(0deg); }
        }

        @keyframes spin-chaos {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.5); }
            to { transform: rotate(360deg) scale(1); }
        }

        /* Flash Layer */
        #strobe {
            position: fixed; inset: 0;
            background: #ff0000;
            z-index: 5; pointer-events: none;
            opacity: 0;
            animation: strobe-flash 4s infinite;
        }
        @keyframes strobe-flash {
            0%, 90% { opacity: 0; }
            91% { opacity: 0.2; }
            92% { opacity: 0; }
            93% { opacity: 0.5; background: #fff; }
            94% { opacity: 0; }
        }

    </style>
</head>
<body onclick="descend()">

    <div id="gate">
        <div class="gate-sigil">🜏</div>
    </div>

    <div id="strobe"></div>

    <svg>
        <filter id="massive-distort">
            <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise">
                <animate attributeName="baseFrequency" values="0.01;0.05;0.01" dur="0.2s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" />
            <feColorMatrix type="saturate" values="2" />
        </filter>
    </svg>

    <canvas id="abyss"></canvas>
    <canvas id="blood-rain"></canvas>

    <div class="viewport" id="main">
        <div class="title-box">
            <h1 id="ritual-title">OHDXNIS</h1>
        </div>

        <div class="node-matrix">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="node">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="node">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="node">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="node">
                <span class="sigil">⛧</span><span class="label">Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="node">
                <span class="sigil">🜔</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="node">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="node">
                <span class="sigil">🜓</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="node">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="node">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="loop" loop>
        <source src="Bleood  type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const abyss = document.getElementById('abyss');
        const rain = document.getElementById('blood-rain');
        const aCtx = abyss.getContext('2d');
        const rCtx = rain.getContext('2d');
        let w, h, frame = 0;
        let sigils = [];
        let drops = [];

        const chars = ['⛧','🜏','⸸','𖤐','✕','🜓','🜕','🜔','🜍','🜚','🜛','🜜','🜝','🜞','🜟','🜠','🜡','🜢','🜣','🜤','🜥','🜦','🜧','🜨'];

        function init() {
            w = abyss.width = rain.width = window.innerWidth;
            h = abyss.height = rain.height = window.innerHeight;
            sigils = [];
            // MASSIVE SYMBOLIC CHAOS
            for(let i=0; i<600; i++) {
                sigils.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    s: Math.random() * 50 + 10,
                    char: chars[Math.floor(Math.random() * chars.length)],
                    vR: (Math.random() - 0.5) * 0.5,
                    angle: Math.random() * Math.PI * 2,
                    color: Math.random() > 0.5 ? '#ff0000' : '#ffffff'
                });
            }
        }

        function spawnDrop() {
            drops.push({
                x: Math.random() * w,
                y: -100,
                vY: Math.random() * 30 + 10,
                l: Math.random() * 100 + 50,
                w: Math.random() * 5 + 2
            });
        }

        function draw() {
            // White/Red Feedback smear
            aCtx.fillStyle = frame % 10 === 0 ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.2)';
            aCtx.fillRect(0, 0, w, h);

            sigils.forEach(s => {
                aCtx.save();
                aCtx.translate(s.x, s.y);
                aCtx.rotate(s.angle);
                aCtx.fillStyle = s.color;
                aCtx.font = `bold ${s.s}px serif`;
                aCtx.fillText(s.char, 0, 0);
                aCtx.restore();
                
                s.angle += s.vR;
                s.y += Math.sin(frame * 0.1) * 5;
                if(Math.random() > 0.98) s.char = chars[Math.floor(Math.random() * chars.length)];
            });

            // Gory Rain
            rCtx.clearRect(0, 0, w, h);
            rCtx.strokeStyle = '#ff0000';
            drops.forEach((d, i) => {
                rCtx.lineWidth = d.w;
                rCtx.beginPath();
                rCtx.moveTo(d.x, d.y);
                rCtx.lineTo(d.x, d.y + d.l);
                rCtx.stroke();
                d.y += d.vY;
                if(d.y > h) drops.splice(i, 1);
            });

            if(drops.length < 150) spawnDrop();

            frame++;
            requestAnimationFrame(draw);
        }

        function descend() {
            document.getElementById('loop').play().catch(()=>{});
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main').style.opacity = '1';
                draw();
            }, 500);
            init();
        }

        window.onresize = init;
    </script>
</body>
</html>

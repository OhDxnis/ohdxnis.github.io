<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OHDXNIS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  background: black;
}

#enter {
  border: 1px solid white;
  padding: 12px 20px;
  cursor: pointer;
  letter-spacing: 3px;
}

#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 5;
}

a {
  color: white;
  text-decoration: none;
  display: block;
  margin-top: 5px;
  opacity: 0.7;
}

a:hover {
  opacity: 1;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div id="overlay">
  <div id="enter">ENTER</div>
  <p style="opacity:0.5;">click to load experience</p>
</div>

<div id="ui">
  <h1>OHDXNIS</h1>
  <a href="https://instagram.com/denis.gjoka_/" target="_blank">Instagram</a>
  <a href="https://youtube.com/@OhDxnis" target="_blank">YouTube</a>
  <a href="https://soundcloud.com/ohdxnis" target="_blank">SoundCloud</a>
</div>

<!-- SoundCloud embed -->
<iframe width="100%" height="166" scrolling="no" frameborder="no"
allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/ohdxnis&color=%23000000&inverse=false&auto_play=false&show_user=true">
</iframe>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2
  });
}

let mouse = {x:0,y:0};

window.addEventListener("mousemove", (e)=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let p of particles){

    let dx = p.x - mouse.x;
    let dy = p.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 120){
      p.x += dx * 0.01;
      p.y += dy * 0.01;
    }

    p.x += p.vx;
    p.y += p.vy;

    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.fillStyle = "white";
    ctx.fillRect(p.x,p.y,2,2);
  }

  requestAnimationFrame(draw);
}
draw();

// AUDIO SYSTEM (simple reactive)
let audio = new Audio("New_Project (45).mp3"); // replace if you want local file
audio.loop = true;

let audioCtx, analyser, source, dataArray;

document.getElementById("enter").onclick = async () => {
  document.getElementById("overlay").style.display = "none";

  audio.play();

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  analyser.fftSize = 64;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  animateAudio();
};

function animateAudio(){
  requestAnimationFrame(animateAudio);
  analyser.getByteFrequencyData(dataArray);

  let avg = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;

  document.body.style.filter = `contrast(${100+avg}%) brightness(${100+avg/5}%)`;
}

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OhDxnis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* subtle moving grain */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: url("https://www.transparenttextures.com/patterns/noise.png");
  opacity: 0.06;
  animation: grain 6s steps(10) infinite;
  pointer-events: none;
}

@keyframes grain {
  0% { transform: translate(0,0); }
  100% { transform: translate(-5%,5%); }
}

/* center layout */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

h1 {
  font-size: 64px;
  letter-spacing: 8px;
  margin: 0;
}

p {
  opacity: 0.5;
}

/* links */
a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
  opacity: 0.6;
}

a:hover {
  opacity: 1;
}

/* cursor */
#cursor {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: white;
  pointer-events: none;
  transform: translate(-50%, -50%);
}

/* music button */
#btn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  border: 1px solid white;
  padding: 10px 18px;
  cursor: pointer;
  opacity: 0.7;
}

#btn:hover {
  opacity: 1;
}

/* soundcloud box */
.sc {
  margin-top: 20px;
  opacity: 0.9;
}
</style>
</head>

<body>

<div id="cursor"></div>

<div class="container">
  <h1>OHDXNIS</h1>
  <p>First albanian to do it</p>

  <div>
    <a href="https://www.instagram.com/denis.gjoka_/" target="_blank">instagram</a>
    <a href="https://www.youtube.com/@OhDxnis" target="_blank">youtube</a>
    <a href="https://soundcloud.com/ohdxnis" target="_blank">soundcloud</a>
  </div>

  <div class="sc">
    <iframe width="300" height="120"
    scrolling="no"
    frameborder="no"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/ohdxnis">
    </iframe>
  </div>
</div>

<div id="btn">ENTER SOUND</div>

<audio id="audio" loop>
  <source src="New_Project (45).mp3" type="audio/mpeg">
</audio>

<script>
// cursor follow
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// music
const audio = document.getElementById("audio");
document.getElementById("btn").onclick = () => {
  audio.play();
  document.getElementById("btn").style.display = "none";
};
</script>

</body>
</html>

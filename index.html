<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHDXNIS | AD INFINITUM</title>
    <style>
        :root {
            --void: #000000;
            --blood: #4a0000;
            --flesh: #ff0000;
            --font-main: 'Cinzel', serif;
            --font-ui: 'Courier New', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--void);
            color: #fff;
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
        }

        /* --- THE GATE OF SACRIFICE (UNLOCK SCREEN) --- */
        #gate {
            position: fixed; inset: 0;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s cubic-bezier(1,0,0,1), visibility 1.5s;
        }
        .gate-sigil {
            font-size: 15vw; color: var(--flesh);
            filter: drop-shadow(0 0 40px var(--blood));
            animation: breathe 0.5s infinite alternate;
            cursor: pointer;
        }
        #gate p { 
            color: #fff; letter-spacing: 15px; font-size: 10px; 
            margin-top: 40px; opacity: 0.5; font-family: monospace; 
        }

        /* --- THE CHAOS & DRIP ENGINE CANVASES --- */
        #abyss-canvas, #drip-canvas {
            position: fixed; inset: 0;
            z-index: 1; pointer-events: none;
        }
        #drip-canvas {
            z-index: 2; /* Drips layer above falling sigils */
        }

        /* --- THE DISTORTION VIEWPORT --- */
        .viewport {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            filter: url(#heavy-glitch); /* GLOBAL DISTORTION */
            transition: opacity 2s ease;
        }

        /* THE TITLE: SMALL, SHARP, AND GHOSTLY */
        .header { 
            margin-bottom: 8vh; 
            text-align: center;
        }
        
        h1#ritual-title {
            font-family: 'Cinzel', serif;
            font-size: 6vw;
            letter-spacing: 35px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--flesh), 5px 5px 0 var(--blood);
            animation: violent-shiver 0.05s infinite;
        }

        .subtitle {
            color: var(--flesh);
            font-size: 0.8rem;
            letter-spacing: 2.5rem;
            margin-top: 20px;
            font-weight: 900;
            opacity: 0.6;
        }

        /* --- HIGH VISIBILITY FLOATING RITUAL NODES --- */
        .node-matrix {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            max-width: 900px;
            z-index: 20;
        }

        .node {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .node .sigil {
            font-size: 4rem;
            color: var(--blood);
            text-shadow: 0 0 10px rgba(0,0,0,1);
            margin-bottom: 10px;
            transition: 0.3s;
            animation: slow-sway 3s infinite alternate;
            filter: blur(1px); /* Slight blur until hover */
        }

        /* SHARP LABELS (CRITICAL FIX FOR VISIBILITY) */
        .altar-link .label {
            color: var(--ui-white);
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 2px;
            filter: none !important; /* Forces clarity */
        }

        .node:hover {
            transform: scale(1.3) translateY(-10px);
            z-index: 100;
        }
        .node:hover .sigil {
            color: var(--flesh);
            filter: blur(0px) drop-shadow(0 0 20px red);
            transform: scale(1.2);
        }
        .node:hover .label {
            color: #fff;
            background: var(--blood);
            border-left: 2px solid #fff;
        }

        /* --- SVG FILTERS --- */
        svg.ritual-filters { position: absolute; width: 0; height: 0; }

        @keyframes breathe { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.1); } }
        
        @keyframes violent-shiver {
            0% { transform: translate(0,0); }
            25% { transform: translate(-4px, 2px) skewX(10deg); }
            75% { transform: translate(4px, -2px) skewX(-10deg); }
        }

        @keyframes slow-sway {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }

    </style>
</head>
<body onclick="descend()">

    <div id="gate">
        <div class="gate-sigil">🜏</div>
        <p>TAP TO ENTER THE VOID</p>
    </div>

    <svg class="ritual-filters">
        <filter id="heavy-glitch">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise">
                <animate attributeName="baseFrequency" values="0.05;0.5;0.05" dur="0.1s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
        </filter>
    </svg>

    <canvas id="abyss-canvas"></canvas> <canvas id="drip-canvas"></canvas> <div class="viewport" id="main">
        <div class="header">
            <h1 id="ritual-title">OHDXNIS</h1>
            <p class="subtitle">AD INFINITUM</p>
        </div>

        <div class="node-matrix">
            <a href="https://it.wikipedia.org/wiki/Utente:Denis.Gjoka00/Sandbox" target="_blank" class="node">
                <span class="sigil">🜏</span><span class="label">Wikipedia</span></a>
            <a href="https://genius.com/artists/Ohdxnis" target="_blank" class="node">
                <span class="sigil">𖤐</span><span class="label">Genius</span></a>
            <a href="https://www.youtube.com/@OhDxnis" target="_blank" class="node">
                <span class="sigil">⸸</span><span class="label">YouTube</span></a>
            <a href="https://ohdxnis.fandom.com/wiki/OhDxnis!_Wiki" target="_blank" class="node">
                <span class="sigil">⛧</span><span class="label">Fandom</span></a>
            <a href="https://www.tiktok.com/@nerd.alt" target="_blank" class="node">
                <span class="sigil">🜔</span><span class="label">TikTok</span></a>
            <a href="https://www.instagram.com/denis.gjoka_/" target="_blank" class="node">
                <span class="sigil">🜕</span><span class="label">Instagram</span></a>
            <a href="https://soundcloud.com/ohdxnis" target="_blank" class="node">
                <span class="sigil">🜓</span><span class="label">Soundcloud</span></a>
            <a href="https://open.spotify.com/artist/4U3Ylg19PV91nwShOuFFGR" target="_blank" class="node">
                <span class="sigil">🜖</span><span class="label">Spotify</span></a>
            <a href="https://open.spotify.com/show/6XWs4fWUVKMWPl3Vl8ejFx" target="_blank" class="node">
                <span class="sigil">🜗</span><span class="label">Mixtape</span></a>
        </div>
    </div>

    <audio id="wire-audio" loop>
        <source src="Bleood  type beat wires.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('wire-audio');
        const aCanvas = document.getElementById('abyss-canvas');
        const dCanvas = document.getElementById('drip-canvas');
        const aCtx = aCanvas.getContext('2d');
        const dCtx = dCanvas.getContext('2d');
        
        let width, height, frame = 0;
        let bloodFlow = [];
        let bloodDrips = [];
        let mouse = { x: -1000, y: -1000 };

        function init() {
            width = aCanvas.width = dCanvas.width = window.innerWidth;
            height = aCanvas.height = dCanvas.height = window.innerHeight;
            
            bloodFlow = [];
            bloodDrips = [];

            // Generate 888 Sigil Particles (falling swarm)
            for(let i=0; i<888; i++) {
                bloodFlow.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 4 + 1,
                    vY: Math.random() * 10 + 3,
                    char: ['⛧', '🜏', '⸸', '𖤐', '✕', '🜓'][Math.floor(Math.random()*6)],
                    opacity: Math.random() * 0.4
                });
            }

            // Generate initial blood drips
            for(let i=0; i<50; i++) {
                spawnDrip();
            }
        }

        function spawnDrip() {
            bloodDrips.push({
                x: Math.random() * width,
                y: Math.random() * -100, // Spawn above screen
                length: Math.random() * 100 + 50,
                width: Math.random() * 3 + 1,
                vY: Math.random() * 5 + 2, // Falling speed
                pooling: 0, // Bottom accumulation factor
                finished: false
            });
        }

        function drawAbyss() {
            // Persistent blood trails (does not clear)
            aCtx.fillStyle = 'rgba(1, 0, 0, 0.1)'; 
            aCtx.fillRect(0, 0, width, height);

            // Draw Smearing Sigil Swarm
            bloodFlow.forEach(p => {
                aCtx.fillStyle = `rgba(255, 0, 0, ${p.opacity})`;
                aCtx.font = `${p.size * 10}px serif`;
                aCtx.fillText(p.char, p.x, p.y);
                
                // Connection Wires to Cursor
                let dist = Math.hypot(p.x - mouse.x, p.y - mouse.y);
                if(dist < 300) {
                    aCtx.strokeStyle = `rgba(255, 0, 0, ${1 - dist/300})`;
                    aCtx.lineWidth = 0.5;
                    aCtx.beginPath();
                    aCtx.moveTo(p.x, p.y);
                    aCtx.lineTo(mouse.x, mouse.y);
                    aCtx.stroke();
                }

                p.y += p.vY;
                if(p.y > height) {
                    p.y = -50;
                    p.x = Math.random() * width;
                }
            });
        }

        function drawDrips() {
            // Clear drip canvas every frame (real-time drips layer)
            dCtx.clearRect(0, 0, width, height);
            
            dCtx.lineCap = 'round';

            bloodDrips.forEach((d, index) => {
                // Determine color based on "age" / pooling status
                if(d.pooling > 20) {
                    dCtx.strokeStyle = 'rgba(74, 0, 0, 0.8)'; // dried pool
                } else {
                    dCtx.strokeStyle = 'rgba(255, 0, 0, 0.7)'; // fresh drip
                }
                
                dCtx.lineWidth = d.width;
                
                // Draw dynamic length dripping line
                dCtx.beginPath();
                dCtx.moveTo(d.x, d.y);
                dCtx.lineTo(d.x, d.y + (d.pooling > 0 ? d.length * 0.1 : d.length));
                dCtx.stroke();

                // Drip Logic
                if (d.y < height - (d.length * 0.5)) {
                    // Drip is falling
                    d.y += d.vY;
                } else {
                    // Drip has hit the bottom or pooling point
                    if(d. pooling === 0) d.vY *= 0.5; // Slow down initial accumulation
                    
                    d.pooling += 1;
                    d.width += 0.05; // Pool widens
                    
                    if(d.pooling > 100) d.finished = true; // Mark old drips for removal
                }
            });

            // Maintain drip count, remove finished ones and spawn new ones
            bloodDrips = bloodDrips.filter(d => !d.finished);
            while (bloodDrips.length < 50) spawnDrip();
        }

        function animate() {
            if(document.getElementById('gate').style.display === 'none') {
                frame++;
                drawAbyss();
                drawDrips();
            }
            requestAnimationFrame(animate);
        }

        function descend() {
            // UNLOCK AUDIO Context
            audio.play().catch(e => console.error("Ritual Audio Blocked:", e));

            // Hide Seal
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main').style.opacity = '1';
                animate(); // Start animation loop after interaction
            }, 1000);

            init();
        }

        window.addEventListener('resize', init);
        
        // Parallax & Connection tracker
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            if(document.getElementById('gate').style.display === 'none') {
                const moveX = (e.clientX / width - 0.5) * 50;
                const moveY = (e.clientY / height - 0.5) * 60;
                document.getElementById('main').style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
</body>
</html>

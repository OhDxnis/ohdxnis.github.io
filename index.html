<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OhDxnis!</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

/* center content */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* main name */
h1 {
    font-size: 80px;
    letter-spacing: 10px;
    margin: 0;
    transition: 0.3s;
}

/* subtle hover glitch */
h1:hover {
    letter-spacing: 20px;
    opacity: 0.8;
}

/* links */
.links {
    margin-top: 30px;
}

a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 8px 0;
    opacity: 0.5;
    transition: 0.3s;
    font-size: 14px;
    letter-spacing: 2px;
}

a:hover {
    opacity: 1;
}

/* background grain effect */
body::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.05;
    animation: move 10s infinite linear;
}

@keyframes move {
    0% { transform: translate(0,0); }
    100% { transform: translate(-50px,-50px); }
}
</style>
</head>

<body>

<div class="container">
    <h1>OhDxnis!</h1>

    <div class="links">
        <a href="https://soundcloud.com/ohdxnis">SOUNDCLOUD</a>
        <a href="https://linktr.ee/OhDxnis">ALL LINKS</a>
        <a href="#">YOUTUBE</a>
    </div>
</div>

</body>
</html>
